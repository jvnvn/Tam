<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TamTam - Login</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js">
    </script>

    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --input-bg: #f9fafb;
            --input-border: #e5e7eb;
            --input-focus: #4f46e5;
            --error-bg: #fef2f2;
            --error-text: #dc2626;
            --error-border: #fecaca;
            --success-bg: #f0fdf4;
            --success-text: #16a34a;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px rgba(0, 0, 0, 0.1), 0 10px 10px rgba(0, 0, 0, 0.04);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 30%, #fce7f3 60%, #e0e7ff 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
        }

        @keyframes gradientShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        /* Card */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 40px 36px;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4f46e5, #7c3aed, #a855f7, #4f46e5);
            background-size: 200% 100%;
            animation: shimmer 3s ease infinite;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* Logo / Brand */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.3);
        }
        .brand .icon-wrapper svg {
            width: 28px;
            height: 28px;
            color: white;
        }
        .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .brand p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #f3f4f6;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 28px;
            position: relative;
        }
        .tabs button {
            flex: 1;
            padding: 11px 20px;
            border: none;
            background: transparent;
            border-radius: 26px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all var(--transition);
            position: relative;
            z-index: 1;
            letter-spacing: 0.2px;
        }
        .tabs button.active {
            background: #ffffff;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        .tabs button:hover:not(.active) {
            color: #374151;
        }

        /* Forms */
        .form-panel {
            display: none;
            flex-direction: column;
            gap: 18px;
            animation: fadeSlideIn 0.35s ease;
        }
        .form-panel.active {
            display: flex;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            letter-spacing: 0.2px;
        }
        .form-group input {
            padding: 13px 16px;
            border: 2px solid var(--input-border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            background: var(--input-bg);
            transition: all var(--transition);
            outline: none;
            color: var(--text);
            letter-spacing: 0.3px;
        }
        .form-group input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
            background: #fff;
        }
        .form-group input::placeholder {
            color: #cbd5e1;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
            margin-top: 6px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #4338ca, #6d28d9);
            box-shadow: 0 6px 22px rgba(79, 70, 229, 0.4);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Messages */
        .message {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            letter-spacing: 0.2px;
            line-height: 1.4;
        }
        .message.error {
            display: block;
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
        }
        .message.success {
            display: block;
            background: var(--success-bg);
            color: var(--success-text);
            border: 1px solid #bbf7d0;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #cbd5e1;
            font-size: 0.8rem;
            margin: 4px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        /* Footer text */
        .footer-text {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Dashboard (hidden by default) */
        .dashboard {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            animation: fadeSlideIn 0.4s ease;
        }
        .dashboard.active {
            display: flex;
        }
        .dashboard .welcome-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            font-weight: 700;
            box-shadow: 0 8px 28px rgba(79, 70, 229, 0.3);
        }
        .dashboard h2 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .dashboard .user-email {
            color: var(--text-secondary);
            font-size: 0.9rem;
            background: #f3f4f6;
            padding: 8px 18px;
            border-radius: 20px;
        }
        .dashboard .btn-signout {
            background: #fff;
            color: #dc2626;
            border: 2px solid #fecaca;
            box-shadow: none;
            margin-top: 8px;
            font-weight: 600;
        }
        .dashboard .btn-signout:hover {
            background: #fef2f2;
            border-color: #fca5a5;
            box-shadow: 0 4px 14px rgba(220, 38, 38, 0.12);
            transform: translateY(-1px);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
                border-radius: 20px;
            }
            .brand h1 {
                font-size: 1.4rem;
            }
            .tabs button {
                font-size: 0.82rem;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Card -->
        <div class="card" id="authCard">
            <!-- Brand -->
            <div class="brand">
                <div class="icon-wrapper">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8.625 9.75a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 0 1 .778-.332 48.294 48.294 0 0 0 5.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
                    </svg>
                </div>
                <h1>TamTam</h1>
                <p>Connect &amp; chat with friends</p>
            </div>

            <!-- Tabs -->
            <div class="tabs" id="tabContainer">
                <button class="active" data-tab="login">Sign In</button>
                <button data-tab="signup">Create Account</button>
            </div>

            <!-- Login Form -->
            <div class="form-panel active" id="loginPanel">
                <div id="loginMessage" class="message"></div>
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button class="btn btn-primary" id="loginBtn">
                    <span id="loginBtnText">Sign In</span>
                </button>
                <p class="footer-text">Welcome back! 👋</p>
            </div>

            <!-- Signup Form -->
            <div class="form-panel" id="signupPanel">
                <div id="signupMessage" class="message"></div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="signupConfirm">Confirm Password</label>
                    <input type="password" id="signupConfirm" placeholder="Re-enter password" autocomplete="new-password">
                </div>
                <button class="btn btn-primary" id="signupBtn">
                    <span id="signupBtnText">Create Account</span>
                </button>
                <p class="footer-text">Join the community! 🎉</p>
            </div>

            <!-- Dashboard (hidden initially) -->
            <div class="dashboard" id="dashboardPanel">
                <div class="welcome-avatar" id="avatarInitial">?</div>
                <h2>Welcome!</h2>
                <span class="user-email" id="userEmailDisplay">user@example.com</span>
                <p style="color:#6b7280;font-size:0.9rem;">You are now signed in to TamTam.</p>
                <button class="btn btn-primary btn-signout" id="signoutBtn">
                    Sign Out
                </button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== FIREBASE CONFIG ====================
            const firebaseConfig = {
                apiKey: "AIzaSyBZvyyRS_NKLbXswsm_JTWVb45Eg6Mc_QA",
                authDomain: "tam-tam-eef1f.firebaseapp.com",
                projectId: "tam-tam-eef1f",
                storageBucket: "tam-tam-eef1f.firebasestorage.app",
                messagingSenderId: "633575617588",
                appId: "1:633575617588:web:fe6494db927782c8384661",
                measurementId: "G-Z6T5XXBHF1"
            };

            // Initialize Firebase
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            // ==================== DOM ELEMENTS ====================
            const authCard = document.getElementById('authCard');
            const tabContainer = document.getElementById('tabContainer');
            const loginPanel = document.getElementById('loginPanel');
            const signupPanel = document.getElementById('signupPanel');
            const dashboardPanel = document.getElementById('dashboardPanel');
            const brandSection = authCard.querySelector('.brand');

            // Tabs
            const tabButtons = tabContainer.querySelectorAll('button');

            // Login
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginMessage = document.getElementById('loginMessage');

            // Signup
            const signupEmail = document.getElementById('signupEmail');
            const signupPassword = document.getElementById('signupPassword');
            const signupConfirm = document.getElementById('signupConfirm');
            const signupBtn = document.getElementById('signupBtn');
            const signupBtnText = document.getElementById('signupBtnText');
            const signupMessage = document.getElementById('signupMessage');

            // Dashboard
            const avatarInitial = document.getElementById('avatarInitial');
            const userEmailDisplay = document.getElementById('userEmailDisplay');
            const signoutBtn = document.getElementById('signoutBtn');

            // ==================== TAB SWITCHING ====================
            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tab = button.getAttribute('data-tab');

                    // Update active tab button
                    tabButtons.forEach(b => b.classList.remove('active'));
                    button.classList.add('active');

                    // Show/hide panels
                    if (tab === 'login') {
                        loginPanel.classList.add('active');
                        signupPanel.classList.remove('active');
                        dashboardPanel.classList.remove('active');
                        brandSection.style.display = '';
                        clearMessages();
                    } else if (tab === 'signup') {
                        signupPanel.classList.add('active');
                        loginPanel.classList.remove('active');
                        dashboardPanel.classList.remove('active');
                        brandSection.style.display = '';
                        clearMessages();
                    }
                });
            });

            function clearMessages() {
                loginMessage.textContent = '';
                loginMessage.className = 'message';
                signupMessage.textContent = '';
                signupMessage.className = 'message';
            }

            function showMessage(element, text, type) {
                element.textContent = text;
                element.className = 'message ' + type;
            }

            // ==================== LOADING STATE ====================
            function setLoading(btn, btnText, isLoading) {
                if (isLoading) {
                    btn.disabled = true;
                    btnText.innerHTML = '<span class="spinner"></span> Please wait...';
                } else {
                    btn.disabled = false;
                    btnText.textContent = btn === loginBtn ? 'Sign In' : 'Create Account';
                }
            }

            // ==================== AUTH STATE OBSERVER ====================
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // User is signed in
                    showDashboard(user);
                } else {
                    // User is signed out
                    showAuthForms();
                }
            });

            function showDashboard(user) {
                loginPanel.classList.remove('active');
                signupPanel.classList.remove('active');
                dashboardPanel.classList.add('active');
                brandSection.style.display = '';
                tabContainer.style.display = 'none';

                // Set user info
                const email = user.email || 'User';
                userEmailDisplay.textContent = email;
                const initial = email.charAt(0).toUpperCase();
                avatarInitial.textContent = initial;

                clearMessages();
            }

            function showAuthForms() {
                dashboardPanel.classList.remove('active');
                brandSection.style.display = '';
                tabContainer.style.display = 'flex';

                // Reset to login tab
                tabButtons.forEach(b => b.classList.remove('active'));
                tabButtons[0].classList.add('active');
                loginPanel.classList.add('active');
                signupPanel.classList.remove('active');

                // Clear inputs
                loginEmail.value = '';
                loginPassword.value = '';
                signupEmail.value = '';
                signupPassword.value = '';
                signupConfirm.value = '';
                clearMessages();

                // Re-enable buttons
                loginBtn.disabled = false;
                loginBtnText.textContent = 'Sign In';
                signupBtn.disabled = false;
                signupBtnText.textContent = 'Create Account';
            }

            // ==================== LOGIN ====================
            loginBtn.addEventListener('click', async () => {
                const email = loginEmail.value.trim();
                const password = loginPassword.value;

                // Clear previous message
                showMessage(loginMessage, '', '');

                // Validation
                if (!email) {
                    showMessage(loginMessage, 'Please enter your email address.', 'error');
                    loginEmail.focus();
                    return;
                }
                if (!password) {
                    showMessage(loginMessage, 'Please enter your password.', 'error');
                    loginPassword.focus();
                    return;
                }

                setLoading(loginBtn, loginBtnText, true);

                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    // onAuthStateChanged will handle UI update
                } catch (error) {
                    let errorMsg = 'An error occurred. Please try again.';
                    switch (error.code) {
                        case 'auth/invalid-email':
                            errorMsg = 'Invalid email format.';
                            break;
                        case 'auth/user-not-found':
                            errorMsg = 'No account found with this email.';
                            break;
                        case 'auth/wrong-password':
                            errorMsg = 'Incorrect password. Please try again.';
                            break;
                        case 'auth/invalid-credential':
                            errorMsg = 'Invalid email or password. Please check your credentials.';
                            break;
                        case 'auth/too-many-requests':
                            errorMsg = 'Too many attempts. Please wait a moment and try again.';
                            break;
                        case 'auth/user-disabled':
                            errorMsg = 'This account has been disabled.';
                            break;
                        default:
                            errorMsg = error.message || errorMsg;
                    }
                    showMessage(loginMessage, errorMsg, 'error');
                } finally {
                    setLoading(loginBtn, loginBtnText, false);
                }
            });

            // Login on Enter key
            loginPassword.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') loginBtn.click();
            });
            loginEmail.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') loginPassword.focus();
            });

            // ==================== SIGNUP ====================
            signupBtn.addEventListener('click', async () => {
                const email = signupEmail.value.trim();
                const password = signupPassword.value;
                const confirm = signupConfirm.value;

                // Clear previous message
                showMessage(signupMessage, '', '');

                // Validation
                if (!email) {
                    showMessage(signupMessage, 'Please enter your email address.', 'error');
                    signupEmail.focus();
                    return;
                }
                if (!password) {
                    showMessage(signupMessage, 'Please create a password.', 'error');
                    signupPassword.focus();
                    return;
                }
                if (password.length < 6) {
                    showMessage(signupMessage, 'Password must be at least 6 characters.', 'error');
                    signupPassword.focus();
                    return;
                }
                if (password !== confirm) {
                    showMessage(signupMessage, 'Passwords do not match.', 'error');
                    signupConfirm.focus();
                    return;
                }

                setLoading(signupBtn, signupBtnText, true);

                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                    // onAuthStateChanged will handle UI update
                } catch (error) {
                    let errorMsg = 'An error occurred. Please try again.';
                    switch (error.code) {
                        case 'auth/email-already-in-use':
                            errorMsg = 'An account with this email already exists.';
                            break;
                        case 'auth/invalid-email':
                            errorMsg = 'Invalid email format.';
                            break;
                        case 'auth/weak-password':
                            errorMsg = 'Password is too weak. Use at least 6 characters.';
                            break;
                        case 'auth/operation-not-allowed':
                            errorMsg = 'Email/password sign-up is not enabled.';
                            break;
                        default:
                            errorMsg = error.message || errorMsg;
                    }
                    showMessage(signupMessage, errorMsg, 'error');
                } finally {
                    setLoading(signupBtn, signupBtnText, false);
                }
            });

            // Signup on Enter key
            signupConfirm.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') signupBtn.click();
            });
            signupEmail.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') signupPassword.focus();
            });
            signupPassword.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') signupConfirm.focus();
            });

            // ==================== SIGNOUT ====================
            signoutBtn.addEventListener('click', async () => {
                try {
                    await auth.signOut();
                    // onAuthStateChanged will handle UI update
                } catch (error) {
                    console.error('Sign out error:', error);
                    // Force UI reset even if signOut fails
                    showAuthForms();
                }
            });
        })();
    </script>
</body>
</html>
